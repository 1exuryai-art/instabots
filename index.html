<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Luxury Tech Beauty Mini App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-1: #06030b;
      --bg-2: #10061a;
      --bg-3: #14071f;
      --rose: #ff5ec7;
      --violet: #a855f7;
      --silver: #e7e9ff;
      --glass: rgba(255,255,255,0.08);
      --glass-2: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.11);
      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.58);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #05030a;
      color: white;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(circle at 15% 15%, rgba(255,94,199,0.18), transparent 25%),
        radial-gradient(circle at 85% 12%, rgba(168,85,247,0.16), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(231,233,255,0.08), transparent 28%),
        linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 35%, var(--bg-1) 100%);
    }

    .app-shell {
      position: relative;
      min-height: 100vh;
      width: 100%;
      padding: 18px 14px 24px;
    }

    .bg-png {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('./luxury-beauty-bg-vertical.png');
      background-size: cover;
      background-position: center;
      opacity: 0.42;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.06;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.14) 0.7px, transparent 0.8px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12) 0.7px, transparent 0.8px);
      background-size: 24px 24px, 32px 32px;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    .glass {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid transparent;
      border-radius: 28px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 0 50px rgba(255,255,255,0.025),
        0 20px 60px rgba(0,0,0,0.42),
        0 0 45px rgba(255,94,199,0.06),
        0 0 0 1px rgba(255,255,255,0.03);
      overflow: hidden;
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,94,199,0.55), rgba(231,233,255,0.34), rgba(168,85,247,0.48));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .top-card { padding: 18px; margin-bottom: 14px; }
    .question-card { padding: 20px; min-height: 520px; }

    .orb-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .orb {
      position: relative;
      width: 118px;
      height: 118px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      box-shadow:
        0 0 55px rgba(255,94,199,0.18),
        inset 0 0 30px rgba(255,255,255,0.08),
        0 0 0 1px rgba(255,255,255,0.03);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: -10px;
      background: radial-gradient(circle, rgba(255,94,199,0.18), transparent 62%);
      filter: blur(16px);
      z-index: 0;
    }

    .orb img {
      position: relative;
      z-index: 1;
      width: 74px;
      height: 74px;
      object-fit: contain;
      opacity: 0.95;
      filter: drop-shadow(0 0 16px rgba(255,255,255,0.14));
    }

    .muted {
      color: var(--muted);
    }

    .field {
      position: relative;
      margin-top: 10px;
    }

    .field input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 16px 16px 16px 18px;
      outline: none;
      font-size: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: 0.25s ease;
    }

    .field input::placeholder { color: rgba(255,255,255,0.36); }
    .field input:focus {
      border-color: rgba(255,94,199,0.30);
      box-shadow: 0 0 0 1px rgba(255,94,199,0.16), 0 0 30px rgba(255,94,199,0.10);
      background: rgba(255,255,255,0.10);
    }

    .progress-line {
      margin: 0 0 14px;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--rose), var(--silver), var(--violet));
      box-shadow: 0 0 20px rgba(255,94,199,0.24);
      transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .title {
      font-size: 24px;
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 8px 0 10px;
      color: rgba(255,255,255,0.96);
    }

    .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.42);
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .option {
      position: relative;
      width: 100%;
      text-align: left;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      color: rgba(255,255,255,0.92);
      padding: 16px 18px;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transform: translateY(20px) scale(0.98);
      opacity: 0;
      animation: optionIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .option:nth-child(1) { animation-delay: 0.04s; }
    .option:nth-child(2) { animation-delay: 0.08s; }
    .option:nth-child(3) { animation-delay: 0.12s; }
    .option:nth-child(4) { animation-delay: 0.16s; }

    .option::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(255,94,199,0.10), transparent 32%);
      opacity: 1;
      pointer-events: none;
    }

    .option:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.06));
    }

    .option.active {
      border-color: rgba(255,94,199,0.35);
      box-shadow:
        0 10px 35px rgba(255,94,199,0.15),
        inset 0 0 30px rgba(255,255,255,0.05),
        0 0 0 1px rgba(255,94,199,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.07));
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      position: relative;
      border: none;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -30%;
      width: 26%;
      height: 100%;
      background: rgba(255,255,255,0.14);
      filter: blur(12px);
      transform: skewX(-20deg);
      transition: left 0.55s ease;
    }

    .btn:hover::before { left: 120%; }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, rgba(255,94,199,0.22), rgba(168,85,247,0.18), rgba(231,233,255,0.10));
      box-shadow: 0 12px 40px rgba(255,94,199,0.20), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .btn-secondary {
      min-width: 108px;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .consent {
      margin-top: 18px;
      padding: 14px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: rgba(255,255,255,0.76);
      font-size: 13px;
      line-height: 1.5;
    }

    .consent input {
      margin-top: 2px;
      accent-color: var(--rose);
    }

    .state-msg {
      margin-top: 12px;
      font-size: 13px;
      color: #ffc6e9;
    }

    .question-stage {
      transform-origin: center bottom;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .question-stage.exit {
      animation: cardOut 0.34s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .success {
      display: none;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .success.active { display: block; }

    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,94,199,0.14);
      border: 1px solid rgba(255,94,199,0.24);
      box-shadow: 0 0 35px rgba(255,94,199,0.16);
      font-size: 24px;
      margin-bottom: 14px;
    }

    @keyframes cardIn {
      0% {
        opacity: 0;
        transform: translateY(70px) scale(0.92) perspective(1200px) rotateX(16deg);
        filter: blur(16px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) perspective(1200px) rotateX(0deg);
        filter: blur(0px);
      }
    }

    @keyframes cardOut {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-20px) scale(1.04);
        filter: blur(10px);
      }
    }

    @keyframes optionIn {
      0% { opacity: 0; transform: translateY(24px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="bg-png"></div>
  <div class="noise"></div>

  <div class="app-shell">
    <div class="content">
      <div class="glass top-card">
        <div class="orb-wrap">
          <div class="orb">
            <img src="./logo-transparent.png" alt="Logo" />
          </div>
        </div>

        <div class="eyebrow">Luxury Tech Beauty</div>
        <div style="font-size: 17px; font-weight: 700; margin-top: 6px;">Telegram Mini App</div>
        <div class="muted" style="font-size: 13px; margin-top: 6px;">Сильный визуал. Быстрый отбор. Данные сразу в Telegram бота.</div>

        <div class="field"><input id="name" placeholder="Твоё имя" /></div>
        <div class="field"><input id="username" placeholder="Telegram username" /></div>
      </div>

      <div class="glass question-card">
        <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>

        <div id="questionStage" class="question-stage">
          <div class="eyebrow" id="stepLabel"></div>
          <div class="title" id="questionTitle"></div>
          <div class="muted" id="questionSubtitle" style="font-size: 14px; line-height: 1.65;"></div>

          <div class="options" id="options"></div>

          <div class="actions">
            <button id="prevBtn" class="btn btn-secondary">Назад</button>
            <button id="nextBtn" class="btn btn-primary">Дальше</button>
          </div>

          <label class="consent">
            <input type="checkbox" id="consent" />
            <span>Я подтверждаю согласие на обработку данных для связи, анализа анкеты и подготовки решения.</span>
          </label>

          <div id="stateMsg" class="state-msg"></div>
        </div>

        <div id="successBlock" class="success">
          <div class="success-icon">✓</div>
          <div class="eyebrow">Submission Complete</div>
          <div class="title">Данные отправлены</div>
          <div class="muted" style="font-size: 14px; line-height: 1.7;">
            Анкета принята. Теперь можно показать следующий экран с оффером, ссылкой в личный Telegram или кнопкой на разбор.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BOT_ENDPOINT = "/api/lead";

    const questions = [
      {
        id: "new_clients",
        title: "Количество новых клиентов в Direct за месяц?",
        subtitle: "Оцени реальный поток, без красивых сказок.",
        options: ["0–10", "10–30", "30–60", "60+"],
      },
      {
        id: "reply_speed",
        title: "Скорость ответа во время работы с клиентом?",
        subtitle: "Как быстро ты реально отвечаешь, когда руки заняты.",
        options: ["Сразу", "5–15 минут", "15–60 минут", "Часто позже часа"],
      },
      {
        id: "forgotten_messages",
        title: "Проблема забытых сообщений?",
        subtitle: "Открыл, отвлёкся, потерял — классика или нет?",
        options: ["Почти не бывает", "Иногда", "Часто", "Это уже система хаоса"],
      },
      {
        id: "daily_replies_time",
        title: "Сколько времени в день уходит на ответы про прайс, адрес и окошки?",
        subtitle: "Тут обычно и умирает время.",
        options: ["До 15 минут", "15–30 минут", "30–60 минут", "1 час+"],
      },
      {
        id: "silent_leads",
        title: "Как работаешь с теми, кто спросил цену и пропал?",
        subtitle: "Есть ли возврат молчунов в диалог.",
        options: ["Никак", "Пишу вручную", "Иногда напоминаю", "Есть система дожима"],
      },
      {
        id: "address_transfer",
        title: "Как передаёшь адрес клиенту?",
        subtitle: "Ручной режим или уже хоть что-то автоматизировано.",
        options: ["Пишу вручную", "Копирую шаблон", "Скидываю геолокацию", "Автоматически"],
      },
      {
        id: "auto_menu",
        title: "Есть ли авто-меню с прайсом в Direct?",
        subtitle: "Чтобы клиент не ждал, пока ты закончишь процедуру.",
        options: ["Нет", "Есть базовое", "Есть с кнопками", "Да, и оно продаёт"],
      },
      {
        id: "reels_keywords",
        title: "Используешь кодовые слова в Reels для автоматизации записи?",
        subtitle: "Например, человек пишет ключевое слово и попадает в воронку.",
        options: ["Нет", "Только думаю об этом", "Тестировал(а)", "Да, использую"],
      },
      {
        id: "night_reaction",
        title: "Что происходит с сообщениями, которые приходят с 23:00 до 01:00?",
        subtitle: "Пока ты живёшь свою жизнь, система должна работать.",
        options: ["Ждут до утра", "Частично отвечаю", "Иногда теряются", "Автоответ + сценарий"],
      },
      {
        id: "no_show_percent",
        title: "Какой процент отмен из-за того, что клиент забыл прийти?",
        subtitle: "Без напоминаний это почти всегда течь в деньгах.",
        options: ["Почти 0%", "До 10%", "10–25%", "25%+"],
      },
      {
        id: "contact_base",
        title: "Есть ли база контактов клиентов?",
        subtitle: "Номера, ники, сегменты — хоть что-то собрано?",
        options: ["Нет", "Частично", "Есть таблица", "Есть база и структура"],
      },
      {
        id: "reviews_collection",
        title: "Как собираешь отзывы?",
        subtitle: "После услуги отзыв должен не выпрашиваться, а собираться системой.",
        options: ["Никак", "Прошу вручную", "Иногда напоминаю", "Через систему"],
      },
      {
        id: "average_check",
        title: "Средний чек мастера?",
        subtitle: "Нужен для оценки потерь и потенциала автоматизации.",
        options: ["До 100 zł", "100–200 zł", "200–400 zł", "400 zł+"],
      }
    ];

    let stepIndex = 0;
    const answers = {};

    const stage = document.getElementById('questionStage');
    const successBlock = document.getElementById('successBlock');
    const stepLabel = document.getElementById('stepLabel');
    const questionTitle = document.getElementById('questionTitle');
    const questionSubtitle = document.getElementById('questionSubtitle');
    const optionsWrap = document.getElementById('options');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const progressFill = document.getElementById('progressFill');
    const stateMsg = document.getElementById('stateMsg');

    function progressPercent() {
      return Math.round(((stepIndex + 1) / questions.length) * 100);
    }

    function renderOptions() {
      const current = questions[stepIndex];
      optionsWrap.innerHTML = '';

      current.options.forEach((option) => {
        const button = document.createElement('button');
        button.className = 'option' + (answers[current.id] === option ? ' active' : '');
        button.textContent = option;
        button.onclick = () => {
          answers[current.id] = option;
          render();
        };
        optionsWrap.appendChild(button);
      });
    }

    function render() {
      const current = questions[stepIndex];
      stepLabel.textContent = `Шаг ${stepIndex + 1} / ${questions.length}`;
      questionTitle.textContent = current.title;
      questionSubtitle.textContent = current.subtitle;
      progressFill.style.width = progressPercent() + '%';
      renderOptions();
      prevBtn.disabled = stepIndex === 0;
      nextBtn.textContent = stepIndex === questions.length - 1 ? 'Отправить данные' : 'Дальше';
      stateMsg.textContent = '';
    }

    function animateChange(callback) {
      stage.classList.add('exit');
      setTimeout(() => {
        stage.classList.remove('exit');
        void stage.offsetWidth;
        callback();
        stage.classList.add('question-stage');
      }, 300);
    }

    prevBtn.onclick = () => {
      if (stepIndex === 0) return;
      stepIndex -= 1;
      animateChange(render);
    };

    nextBtn.onclick = async () => {
      const current = questions[stepIndex];
      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim();
      const consent = document.getElementById('consent').checked;

      if (!answers[current.id]) {
        stateMsg.textContent = 'Выбери вариант ответа.';
        return;
      }

      if (stepIndex < questions.length - 1) {
        stepIndex += 1;
        animateChange(render);
        return;
      }

      if (!name) {
        stateMsg.textContent = 'Введи имя.';
        return;
      }

      if (!username) {
        stateMsg.textContent = 'Введи Telegram username.';
        return;
      }

      if (!consent) {
        stateMsg.textContent = 'Нужно согласие на обработку данных.';
        return;
      }

      const payload = {
        contact: {
          name,
          telegramUsername: username,
        },
        consent,
        submittedAt: new Date().toISOString(),
        source: 'telegram-mini-app',
        answers: questions.map((q, i) => ({
          step: i + 1,
          id: q.id,
          question: q.title,
          answer: answers[q.id] || ''
        }))
      };

      try {
        stateMsg.textContent = 'Отправка...';

        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.sendData) {
          window.Telegram.WebApp.sendData(JSON.stringify(payload));
        }

        const res = await fetch(BOT_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('send error');

        stage.style.display = 'none';
        successBlock.classList.add('active');
      } catch (e) {
        stateMsg.textContent = 'Не удалось отправить данные. Проверь backend route /api/lead.';
      }
    };

    render();
  </script>
</body>
</html>
